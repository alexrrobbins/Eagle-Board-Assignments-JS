<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Board Assignments</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin-bottom: 30px; }
        .list { border: 1px solid #ccc; padding: 10px; min-height: 50px; }
        .entry { margin: 5px 0; }
        .error { color: red; white-space: pre-wrap; }
        .danger { background: #c62828; color: white; border: none; padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Eagle Board Assignments</h1>

    <div class="section">
        <h2>Candidates</h2>
        <label for="candidateInput">Enter candidates (name,troop per line):</label><br>
        <textarea id="candidateInput" rows="5" cols="50" placeholder="John Doe,123&#10;Jane Smith,456"></textarea><br>
        <button id="addCandidate">Add Candidates</button>
        <div class="list" id="candidateList"></div>
    </div>

    <div class="section">
        <h2>Chairpersons</h2>
        <label for="chairpersonInput">Enter chairpersons (name,troop per line):</label><br>
        <textarea id="chairpersonInput" rows="5" cols="50" placeholder="Alice Johnson,789&#10;Bob Wilson,101"></textarea><br>
        <button id="addChairperson">Add Chairpersons</button>
        <div class="list" id="chairpersonList"></div>
    </div>

    <div class="section">
        <h2>Parents</h2>
        <div class="list" id="parentList"></div>
    </div>

    <div class="section">
        <button id="assignButton">Assign Candidates to Chairpersons and Parents</button>
        <button id="copyButton" style="margin-left: 8px;">Copy Assignments</button>
        <div class="list" id="assignmentList"></div>
    </div>

    <div id="invalidStatus" class="error"></div>
    <div id="status"></div>

    <div class="section">
        <button id="clearButton" class="danger">Clear All</button>
    </div>

    <script src="assign.js"></script>
</body>
</html>
